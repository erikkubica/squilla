<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="0"/>
  <!-- Central puzzle piece -->
  <g transform="translate(210,80) scale(3.5)">
    <path d="M30 10 h10 a5 5 0 0 1 0 10 h-10 v10 a5 5 0 0 1 -10 0 v-10 h-10 v20 h20 v-10 a5 5 0 0 1 10 0 v10 h20 v-20 h-10 a5 5 0 0 1 0-10 h10 v-20 h-20 v10 a5 5 0 0 1-10 0 v-10z" fill="white" opacity="0.2"/>
  </g>
  <!-- Code lines floating -->
  <rect x="60" y="290" width="120" height="6" rx="3" fill="white" opacity="0.15"/>
  <rect x="60" y="304" width="80" height="6" rx="3" fill="white" opacity="0.1"/>
  <rect x="60" y="318" width="160" height="6" rx="3" fill="white" opacity="0.15"/>
  <rect x="60" y="332" width="100" height="6" rx="3" fill="white" opacity="0.1"/>
  <rect x="420" y="290" width="120" height="6" rx="3" fill="white" opacity="0.15"/>
  <rect x="420" y="304" width="80" height="6" rx="3" fill="white" opacity="0.1"/>
  <rect x="420" y="318" width="140" height="6" rx="3" fill="white" opacity="0.15"/>
  <rect x="420" y="332" width="90" height="6" rx="3" fill="white" opacity="0.1"/>
  <!-- Hook icons -->
  <g transform="translate(120,120)" opacity="0.25">
    <rect width="40" height="40" rx="8" fill="white"/>
    <path d="M14 14 l12 6 l-12 6z" fill="#059669"/>
  </g>
  <g transform="translate(440,120)" opacity="0.25">
    <rect width="40" height="40" rx="8" fill="white"/>
    <circle cx="20" cy="20" r="8" fill="none" stroke="#059669" stroke-width="2"/>
    <path d="M20 15 v10 M15 20 h10" stroke="#059669" stroke-width="2"/>
  </g>
  <!-- Label -->
  <rect x="200" y="340" width="200" height="30" rx="15" fill="white" opacity="0.15"/>
  <text x="300" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="white" opacity="0.6" font-weight="500">Tengo Script Extension</text>
</svg>
