<section class="section"><div class="container"><div style="text-align: center; margin-bottom: 48px;"><span class="eyebrow">{{- or .eyebrow "What we stand for" -}}</span><h2>{{- or .heading "Three rules we don't break." -}}</h2></div><div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;">{{- range .items -}}<div class="card" style="padding: 32px;"><div class="ph {{- or .color "red" }}" style="width: 60px; height: 60px; border-radius: 50%; margin-bottom: 20px;"><div style="color: {{- if eq .color "yellow" }} rgb(107, 79, 0){{- else if eq .color "green" }} var(--green-deep){{- else }} var(--red-deep){{- end }}; position: relative; z-index: 1;">{{- if eq .icon "heart" -}}<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-8-5-8-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6-8 11-8 11z" transform="translate(-1 0)"></path></svg>{{- else if eq .icon "leaf" -}}<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4c-8 0-14 4-14 12 0 2 1 4 4 4 8 0 10-6 10-16z"></path><path d="M6 20c4-4 7-7 14-16"></path></svg>{{- else -}}<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12"></path><path d="M18 6L6 18"></path></svg>{{- end -}}</div></div><h3 style="margin-bottom: 8px;">{{- .title -}}</h3><p style="color: var(--ink-soft);">{{- .body -}}</p></div>{{- end -}}</div></div></section>
