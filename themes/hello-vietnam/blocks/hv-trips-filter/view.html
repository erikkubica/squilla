{{- /* Trips filter — search + taxonomy-derived pill chips */ -}}
{{- $tags := filter "distinct_field" (dict "type" "trip" "field" "tag") -}}
<section style="padding: 48px 0px 24px; background: var(--cream-warm);" data-trips-root><div class="container">
<div style="text-align: center; margin-bottom: 32px;">{{ with .eyebrow }}<span class="eyebrow">{{ . }}</span>{{ end }}{{ with .heading }}<h1 style="font-size: clamp(2rem, 4vw, 3.2rem);">{{ . }}</h1>{{ end }}</div>
{{ with .search_placeholder }}<div style="display: flex; gap: 12px; max-width: 680px; margin: 0 auto 24px;">
<div style="position: relative; flex: 1;">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--ink-soft);"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
<input data-trip-search class="input" placeholder="{{ . }}" style="padding-left: 46px; height: 52px; border-radius: var(--r-pill);" />
</div>
<button class="btn btn-primary" style="height: 52px; border-radius: var(--r-pill); padding: 0 28px;">Filter</button>
</div>{{ end }}
<div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
<button class="pill active" data-trip-pill="All">All</button>
{{- range $tags -}}
<button class="pill" data-trip-pill="{{.}}">{{.}}</button>
{{- end -}}
</div>
</div></section>
<style>.pill{background:var(--white);border:1px solid var(--line);padding:10px 18px;border-radius:var(--r-pill);font-family:var(--font-display);font-weight:500;cursor:pointer;font-size:0.88rem;transition:all 0.2s}.pill.active{background:var(--red);color:var(--white);border-color:var(--red)}</style>
