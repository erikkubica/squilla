<section class="section" style="background: var(--ink); color: var(--cream); padding: 80px 0px;"><div class="container"><div style="text-align: center; margin-bottom: 56px;">{{ with .eyebrow }}<span class="eyebrow" style="color: var(--yellow);">{{ . }}</span>{{ end }}{{ with .heading }}<h2 style="color: var(--cream); margin-bottom: 12px;">{{ . }}</h2>{{ end }}</div>{{ with .steps }}<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;">{{ range $i, $step := . }}<div style="background: rgba(255, 255, 255, 0.04); padding: 32px 28px; border-radius: var(--r-lg); border: 1px solid rgba(255, 255, 255, 0.08);">{{ with $step.number }}<div style="font-family: var(--font-display); font-size: 3rem; font-weight: 500; color: {{ if eq $step.color "yellow" }}var(--yellow){{ else if eq $step.color "green" }}var(--green){{ else }}var(--red){{ end }}; line-height: 1; margin-bottom: 16px;">{{ . }}</div>{{ end }}{{ with $step.title }}<h3 style="color: var(--cream); margin-bottom: 10px;">{{ . }}</h3>{{ end }}{{ with $step.body }}<p style="opacity: 0.75; font-size: 0.95rem;">{{ . }}</p>{{ end }}</div>{{ end }}</div>{{ end }}</div></section>
