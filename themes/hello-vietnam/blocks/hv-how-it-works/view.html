<section class="section" style="background: var(--ink); color: var(--cream); padding: 80px 0px;"><div class="container"><div style="text-align: center; margin-bottom: 56px;"><span class="eyebrow" style="color: var(--yellow);">{{ or .eyebrow "How it works" }}</span><h2 style="color: var(--cream); margin-bottom: 12px;">{{ or .heading "Three steps. Zero stress." }}</h2></div><div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;">{{ range $i, $step := .steps }}<div style="background: rgba(255, 255, 255, 0.04); padding: 32px 28px; border-radius: var(--r-lg); border: 1px solid rgba(255, 255, 255, 0.08);"><div style="font-family: var(--font-display); font-size: 3rem; font-weight: 500; color: {{ if eq (or $step.color "red") "red" }}var(--red){{ else if eq $step.color "yellow" }}var(--yellow){{ else if eq $step.color "green" }}var(--green){{ else }}var(--red){{ end }}; line-height: 1; margin-bottom: 16px;">{{ $step.number }}</div><h3 style="color: var(--cream); margin-bottom: 10px;">{{ $step.title }}</h3><p style="opacity: 0.75; font-size: 0.95rem;">{{ $step.body }}</p></div>{{ end }}</div></div></section>
