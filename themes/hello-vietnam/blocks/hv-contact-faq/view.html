<section class="section" style="background: var(--cream-warm);"><div class="container"><div style="display: grid; grid-template-columns: 1fr 2fr; gap: 48px; align-items: start;"><div>{{- with .eyebrow }}<span class="eyebrow">{{ . }}</span>{{- end }}{{ with .heading }}<h2>{{ . }}</h2>{{ end }}</div>{{ with .faqs }}<div>{{- range . -}}<div data-accordion-row style="border-bottom: 1px solid var(--line);"><button type="button" data-accordion style="width: 100%; text-align: left; padding: 18px 0px; display: flex; justify-content: space-between; align-items: center; gap: 16px; background: none; border: none; cursor: pointer; font: inherit;"><span style="font-family: var(--font-display); font-weight: 500; font-size: 1.05rem;">{{ .q }}</span><span data-accordion-icon style="width: 32px; height: 32px; border-radius: 50%; background: var(--cream-warm); color: var(--ink); display: grid; place-items: center; flex-shrink: 0; font-size: 1.3rem; line-height: 1;">+</span></button><div data-accordion-panel style="display: none; padding: 0 0 18px; font-size: 0.95rem; line-height: 1.7; color: var(--ink-soft);">{{ safeHTML .a }}</div></div>{{- end -}}</div>{{ end }}</div></div></section>
