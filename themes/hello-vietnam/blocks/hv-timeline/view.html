<section class="section"><div class="container"><div style="text-align: center; margin-bottom: 56px;">{{ with .eyebrow }}<span class="eyebrow">{{ . }}</span>{{ end }}{{ with .heading }}<h2>{{ . }}</h2>{{ end }}</div>{{ with .entries }}<div style="position: relative; max-width: 880px; margin: 0px auto;"><div style="position: absolute; left: 50%; top: 0px; bottom: 0px; width: 3px; background: var(--line); transform: translateX(-50%);"></div>{{- range $i, $e := . -}}{{- $side := mod $i 2 -}}{{- $c := $e.color -}}<div style="display: grid; grid-template-columns: 1fr 36px 1fr; gap: 24px; align-items: center; margin-bottom: 40px;"><div style="display: flex; justify-content: {{ if eq $side 0 }}flex-end{{ else }}flex-start{{ end }}; grid-column: {{ if eq $side 0 }}1{{ else }}3{{ end }};"><div class="card" style="padding: 22px; max-width: 360px;">{{ with $e.year }}<div style="font-family: var(--font-display); font-size: 1.8rem; font-weight: 500; color: var(--{{ $c }}); margin-bottom: 4px;">{{ . }}</div>{{ end }}{{ with $e.body }}<p style="font-size: 0.95rem;">{{ . }}</p>{{ end }}</div></div><div style="grid-column: 2; justify-self: center; width: 18px; height: 18px; border-radius: 50%; background: var(--{{ $c }}); border: 4px solid var(--cream); box-shadow: 0 0 0 2px var(--line); position: relative; z-index: 1;"></div></div>{{- end -}}</div>{{ end }}</div></section>
