{{- if .node.translations -}}
<div class="relative" x-data="{ open: false }">
    <button @click="open = !open" @click.outside="open = false" class="inline-flex items-center gap-1.5 px-2 py-1.5 text-sm text-slate-600 hover:text-indigo-600 rounded-md hover:bg-slate-50 transition-colors">
        {{- range .node.translations -}}
        {{- if .is_current -}}
        <span>{{.flag}}</span>
        <span class="hidden sm:inline text-xs font-medium">{{.language_name}}</span>
        {{- end -}}
        {{- end -}}
        <svg class="h-3.5 w-3.5 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
    </button>
    <div x-show="open" x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-75" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95" class="absolute right-0 mt-1 w-40 rounded-md bg-white shadow-lg ring-1 ring-black/5 py-1 z-50" style="display: none;">
        {{- range .node.translations -}}
        <a href="{{.full_url}}" class="flex items-center gap-2 px-3 py-2 text-sm transition-colors {{if .is_current}}bg-indigo-50 text-indigo-700 font-medium{{else}}text-slate-700 hover:bg-slate-50 hover:text-indigo-600{{end}}">
            <span>{{.flag}}</span>
            <span>{{.language_name}}</span>
        </a>
        {{- end -}}
    </div>
</div>
{{- end -}}
